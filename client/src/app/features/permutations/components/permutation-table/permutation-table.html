<div class="table-responsive">
  <table class="table table-striped table-hover align-middle">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Permutation</th>
      </tr>
    </thead>
    <tbody>
      @for (item of items(); track item.index) {
      <tr>
        <td>
          {{ item.index}}
        </td>
        <td>
          [{{ item.permutation.join(', ') }}]
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
